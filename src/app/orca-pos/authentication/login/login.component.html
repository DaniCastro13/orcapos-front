<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content flex-col">
    <div class="text-center lg:text-left">
      <h1 class="text-5xl font-bold text-center uppercase">Iniciar Sesion</h1>
      <p class="py-6 text-center">
        Bienvenido a ORCA-POS-VENTA.
      </p>
    </div>
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <form class="card-body" (ngSubmit)="login()">
        <div class="form-control">
          <label class="label">
            <span class="label-text">Ingrese tu Usuario:</span>
          </label>
          <input type="text" placeholder="Username" class="input input-bordered" required  [(ngModel)]="username" name="username"/>
        </div>
        <div class="form-control">
          <label class="label">
            <span class="label-text">Ingrese tu Password</span>
          </label>
          <input type="password" placeholder="password" class="input input-bordered" required [(ngModel)]="password" name="password"/>
        </div>
        <div class="form-control mt-6">
          <button class="btn btn-primary">Login</button>
        </div>
      </form>
    </div>
  </div>
</div>
